<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Studio monaka — 会計マネージメントシステム</title>
<style>
  :root { --bg:#f3eed7; --card:#fff; --text:#111; --border:#d8cfa9; --primary:#1a1a1a; --error:#c44a4a; --muted:#6a6552; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 36px 40px 32px; width: 100%; max-width: 440px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); text-align: center; }
  .logo { margin: 0 auto 18px; width: 220px; max-width: 80%; height: auto; display: block; }
  .system-name { font-size: 15px; font-weight: 600; letter-spacing: 0.12em; color: var(--text); margin: 0 0 4px; }
  .divider { width: 36px; height: 1px; background: var(--border); margin: 14px auto 18px; }
  h1 { font-size: 11px; font-weight: 600; letter-spacing: 0.22em; margin: 0 0 6px; color: var(--muted); }
  .sub { font-size: 12px; color: var(--muted); margin: 0 0 22px; }
  input[type="password"] { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; background: #faf6e8; color: var(--text); outline: none; transition: border-color 0.15s; }
  input[type="password"]:focus { border-color: var(--primary); }
  button { margin-top: 14px; width: 100%; padding: 12px; background: var(--primary); color: #fff; border: 0; border-radius: 8px; font-size: 13px; font-weight: 600; letter-spacing: 0.18em; cursor: pointer; transition: opacity 0.15s; }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .msg { margin-top: 14px; font-size: 12px; color: var(--error); min-height: 16px; }
  .ok { color: #2f7a4d; }
  .foot { margin-top: 22px; font-size: 10px; color: #a09a85; letter-spacing: 0.10em; }
  @media (max-width: 480px) { .card { padding: 28px 22px 24px; } .system-name { font-size: 14px; } }
</style>
</head>

const ITER = 200000;
function b64ToBytes(b64){const bin=atob(b64);const out=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)out[i]=bin.charCodeAt(i);return out;}
async function deriveKey(p,salt){const enc=new TextEncoder();const bk=await crypto.subtle.importKey('raw',enc.encode(p),{name:'PBKDF2'},false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ITER,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);}
async function tryDecrypt(p){const pkg=b64ToBytes(PACKAGE_B64);const salt=pkg.slice(0,16);const iv=pkg.slice(16,28);const ct=pkg.slice(28);const key=await deriveKey(p,salt);const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);return new TextDecoder('utf-8').decode(plain);}
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submit');
  btn.disabled = true; btn.textContent = 'CHECKING...';
  msg.textContent = ''; msg.classList.remove('ok');
  try {
    const html = await tryDecrypt(pw);
    msg.classList.add('ok'); msg.textContent = '✓ 認証成功';
    try { sessionStorage.setItem('monaka_unlocked', '1'); } catch(_){}
    document.open(); document.write(html); document.close();
  } catch(err) {
    msg.textContent = 'パスワードが正しくありません';
    btn.disabled = false; btn.textContent = 'UNLOCK';
    document.getElementById('pw').focus();
    document.getElementById('pw').select();
  }
});
